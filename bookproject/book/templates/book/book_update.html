{% extends 'base.html' %}

{% block title %}書籍修正{% endblock %}

{% block content %}
	<!-- 「post」はデータを送る時に使われる。CSRF対策も忘れずに -->
	<form method="post" enctype="multipart/form-data" class="p-4 m-4 bg-light border border-success rounded form-group">
		{%  csrf_token %}
		<!-- 「{{form.as_p}}」は、viewの中で指定したmodelで定義された項目を、pタグで囲って表示させる -->
		{{form.as_p}}
		<button type="submit">修正する</button>
	</form>
{% endblock content %}
